<style>
:root{
  --bg:#0f141b; --panel:#171f2a; --panel2:#1d2733; --line:#2a3644;
  --ink:#e8edf3; --mut:#93a2b4; --dim:#6b7a8c;
  --mod:#f0a829; --pak:#2fb6a0; --acc:#f0a829; --navy:#3b6ea5;
  --good:#3fae6e;
}
*{box-sizing:border-box}
html,body{margin:0;background:var(--bg);color:var(--ink);
  font-family:"Segoe UI",system-ui,-apple-system,Roboto,Helvetica,Arial,sans-serif}
header{position:sticky;top:0;z-index:20;background:linear-gradient(180deg,#11171f,#0c1117);
  border-bottom:1px solid var(--line);padding:12px 18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.clap{width:34px;height:30px;border-radius:4px;background:repeating-linear-gradient(90deg,#0c1117 0 8px,#e8edf3 8px 16px);
  border:2px solid #e8edf3;position:relative;flex:0 0 auto;transform:skewX(-2deg)}
.clap::before{content:"";position:absolute;left:-2px;top:-9px;width:34px;height:8px;
  background:repeating-linear-gradient(110deg,#e8edf3 0 8px,#0c1117 8px 16px);border:2px solid #e8edf3;border-bottom:none;transform:rotate(-8deg);transform-origin:left}
.titwrap h1{font-size:16px;margin:0;letter-spacing:.5px}
.titwrap p{font-size:11px;margin:2px 0 0;color:var(--mut);letter-spacing:.5px}
.spacer{flex:1}
.ctrl{display:flex;gap:8px;align-items:center}
button.btn{background:var(--panel2);color:var(--ink);border:1px solid var(--line);
  padding:8px 13px;border-radius:8px;font-size:13px;cursor:pointer;font-weight:600}
button.btn:hover{border-color:var(--acc);color:var(--acc)}
button.btn.primary{background:var(--acc);color:#1a1206;border-color:var(--acc)}
nav#tabs{display:flex;gap:7px;overflow-x:auto;padding:11px 18px;background:#0c1117;
  border-bottom:1px solid var(--line);scrollbar-width:thin}
.tab{flex:0 0 auto;background:var(--panel);border:1px solid var(--line);border-radius:9px;
  padding:8px 12px;cursor:pointer;min-width:120px;transition:.15s}
.tab .tn{font-size:10px;color:var(--dim);letter-spacing:1px;font-weight:700}
.tab .tt{font-size:12px;margin-top:2px;color:var(--mut);font-weight:600;white-space:nowrap}
.tab:hover{border-color:#3b4a5c}
.tab.active{border-color:var(--acc);background:#20283360}
.tab.active .tt{color:var(--ink)}
.tab.active .tn{color:var(--acc)}
main{max-width:1180px;margin:0 auto;padding:22px 18px 60px}
.panel{display:none;animation:fade .25s ease}
.panel.show{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.scenehead{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;margin-bottom:16px}
.scenehead .num{font-size:13px;font-weight:800;color:#1a1206;background:var(--acc);
  padding:3px 10px;border-radius:6px;letter-spacing:1px}
.scenehead h2{margin:0;font-size:21px}
.scenehead .tc{font-size:13px;color:var(--mut);font-family:"Consolas",monospace;
  border:1px solid var(--line);padding:3px 9px;border-radius:6px}
.grid{display:grid;grid-template-columns:1.45fr 1fr;gap:18px;align-items:start}
@media(max-width:820px){.grid{grid-template-columns:1fr}}
.monitor{background:#05080c;border:1px solid var(--line);border-radius:12px;padding:12px;
  box-shadow:0 8px 30px #00000060}
.monitor svg{width:100%;height:auto;display:block;border-radius:6px;background:#0a0e14}
.moncap{display:flex;justify-content:space-between;align-items:center;margin-top:9px;font-size:11px;color:var(--mut)}
.moncap .dot{width:8px;height:8px;border-radius:50%;background:#e8463c;display:inline-block;margin-right:6px;
  animation:blink 1.4s infinite}
@keyframes blink{50%{opacity:.25}}
.specs{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:4px 16px 14px}
.specrow{padding:12px 0;border-bottom:1px solid var(--line)}
.specrow:last-child{border-bottom:none}
.specrow .k{font-size:10px;letter-spacing:1.5px;color:var(--dim);font-weight:700;text-transform:uppercase}
.specrow .v{font-size:14px;margin-top:4px;color:var(--ink);font-weight:600}
.specrow ul{margin:6px 0 0;padding-left:17px}
.specrow li{font-size:13px;color:var(--mut);margin:4px 0;line-height:1.45}
.chip{display:inline-block;font-size:11px;padding:2px 8px;border-radius:5px;margin:2px 4px 2px 0;
  background:#202833;border:1px solid var(--line);color:var(--mut)}
.script{margin-top:20px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:6px 20px 18px}
.script h3{font-size:12px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;margin:16px 0 4px}
.ln{display:flex;gap:12px;padding:11px 0;border-bottom:1px solid #1f2935;line-height:1.6}
.ln:last-child{border-bottom:none}
.who{flex:0 0 92px;font-size:12px;font-weight:800;letter-spacing:.5px;padding-top:1px}
.who.mod{color:var(--mod)}
.who.pak{color:var(--pak)}
.tx{font-size:14.5px;color:#dde4ec}
.foot{display:flex;justify-content:space-between;align-items:center;margin-top:22px;gap:10px}
.legend{font-size:11px;color:var(--dim);display:flex;gap:16px;flex-wrap:wrap}
.legend b.mod{color:var(--mod)} .legend b.pak{color:var(--pak)}
@media print{
  header,nav#tabs,.foot{display:none}

  main{max-width:none}
  .panel{display:block!important;page-break-after:always}
  .specs,.script,.monitor{background:#fff;border-color:#bbb}
  .specrow .v,.tx{color:#111}.specrow li{color:#333}
  .scenehead h2{color:#111}.script h3{color:#555}
}

<script>
/* ---------- STUDIO BASE DRAWING (viewBox 640x360) ---------- */
function person(cx,sh){ // sh = shoulder colour

  <path d="M${cx-29} 142 Q${cx} 104 ${cx+29} 142 Q${cx+20} 120 ${cx} 119 Q${cx-20} 120 ${cx-29} 142 Z" fill="#39424d"/>
  <path d="M${cx-32} 140 Q${cx} 118 ${cx+32} 140" fill="none" stroke="#222b34" stroke-width="5" stroke-linecap="round"/>
  <rect x="${cx-37} " y="138" width="9" height="20" rx="4" fill="#222b34"/>
  <rect x="${cx+28}" y="138" width="9" height="20" rx="4" fill="#222b34"/>
  <line x1="${cx-12}" y1="252" x2="${cx-2}" y2="206" stroke="#11161d" stroke-width="4" stroke-linecap="round"/>
  <ellipse cx="${cx-2}" cy="200" rx="10" ry="13" fill="#0c1014" stroke="#33404d" stroke-width="2"/>`;
}
const STUDIO = `
  <rect x="-500" y="-400" width="1640" height="1160" fill="url(#wall)"/>
  <rect x="150" y="48" width="340" height="132" rx="10" fill="#141c26" stroke="#27313d"/>
  <text x="320" y="108" text-anchor="middle" font-size="26" fill="#33414f" font-weight="800" letter-spacing="3" font-family="Segoe UI,Arial">EDUTECH</text>
  <text x="320" y="140" text-anchor="middle" font-size="17" fill="#2c3946" letter-spacing="7" font-family="Segoe UI,Arial">AVIONIK</text>
  <rect x="60" y="58" width="48" height="100" rx="6" fill="#16202b" opacity=".7"/>
  <rect x="532" y="58" width="48" height="100" rx="6" fill="#16202b" opacity=".7"/>
  <path d="M60 332 Q320 286 580 332 L580 360 L60 360 Z" fill="#1a232e"/>
  <path d="M60 326 Q320 280 580 326" fill="none" stroke="#2b3744" stroke-width="9"/>
  ${person(215,'#33547f')}
  ${person(425,'#2f7064')}
`;

/* ---------- OVERLAYS (screen space) ---------- */
function overlays(ov,label){
  let s='';
  // thirds
  if(ov.thirds){
    s+=`<g stroke="#ffffff" stroke-opacity=".14" stroke-width="1">
      <line x1="213.3" y1="0" x2="213.3" y2="360"/><line x1="426.6" y1="0" x2="426.6" y2="360"/>
      <line x1="0" y1="120" x2="640" y2="120"/><line x1="0" y1="240" x2="640" y2="240"/></g>`;
  }
  if(ov.warm) s+=`<rect x="0" y="0" width="640" height="360" fill="#f0a829" opacity=".07"/>`;
  // b-roll inset
  if(ov.broll){
    s+=`<g>
      <rect x="430" y="26" width="184" height="120" rx="8" fill="#070b10" stroke="#3b8fd6" stroke-width="2"/>
      <rect x="446" y="58" width="80" height="54" rx="6" fill="#0e1722" stroke="#2a3a4a"/>
      <circle cx="486" cy="78" r="13" fill="none" stroke="#3fb6e0" stroke-width="3"/>
      <rect x="474" y="92" width="24" height="14" rx="3" fill="#3fb6e0" opacity=".5"/>
      <path d="M536 70 h60 M536 82 h48 M536 94 h54" stroke="#395165" stroke-width="3" stroke-linecap="round"/>
      <text x="522" y="138" text-anchor="middle" font-size="11" fill="#7fb6dd" letter-spacing="1" font-family="Segoe UI,Arial">INSERT B-ROLL · VR / SIMULATOR</text></g>`;
  }
  // graphics panel
  if(ov.graphics){
    s+=`<g>
      <rect x="402" y="40" width="214" height="280" rx="10" fill="#070d14" opacity=".82" stroke="#2a3644"/>
      <text x="420" y="72" font-size="12" fill="#f0a829" letter-spacing="1.5" font-weight="700" font-family="Segoe UI,Arial">DATA / STATISTIK</text>
      <g font-family="Segoe UI,Arial">
      <rect x="420" y="92" width="120" height="14" rx="7" fill="#22303d"/><rect x="420" y="92" width="92" height="14" rx="7" fill="#2fb6a0"/>
      <rect x="420" y="120" width="120" height="14" rx="7" fill="#22303d"/><rect x="420" y="120" width="70" height="14" rx="7" fill="#3b6ea5"/>
      <rect x="420" y="148" width="120" height="14" rx="7" fill="#22303d"/><rect x="420" y="148" width="104" height="14" rx="7" fill="#f0a829"/>
      <text x="420" y="206" font-size="40" fill="#e8edf3" font-weight="800">▣ ▣ ▣</text>
      <text x="420" y="250" font-size="13" fill="#7e8ea0">Lebih cepat · konsisten</text>
      <text x="420" y="270" font-size="13" fill="#7e8ea0">Kurang silap</text></g></g>`;
  }
  // demo full
  if(ov.demo){
    s+=`<g>
      <rect x="24" y="40" width="430" height="290" rx="10" fill="#060c13" stroke="#3b6ea5" stroke-width="2"/>
      <text x="44" y="72" font-size="13" fill="#3fb6e0" letter-spacing="1.5" font-weight="700" font-family="Segoe UI,Arial">DEMO · SIMULATOR / RAJAH ALIR</text>
      <g stroke="#2a3a4a" stroke-width="1"><line x1="44" y1="300" x2="430" y2="300"/></g>
      <g fill="#2fb6a0">
        <rect x="70" y="230" width="34" height="70" rx="3"/><rect x="130" y="190" width="34" height="110" rx="3"/>
        <rect x="190" y="150" width="34" height="150" rx="3" fill="#f0a829"/><rect x="250" y="120" width="34" height="180" rx="3"/>
        <rect x="310" y="100" width="34" height="200" rx="3" fill="#3b6ea5"/></g>
      <path d="M70 250 L150 200 L230 160 L320 120" fill="none" stroke="#e8edf3" stroke-width="2.5" stroke-dasharray="4 4" opacity=".7"/>
      <rect x="486" y="40" width="128" height="84" rx="8" fill="#0a1019" stroke="#445365"/>
      <text x="550" y="58" text-anchor="middle" font-size="9" fill="#6b7a8c" letter-spacing="1" font-family="Segoe UI,Arial">PAKAR · PIP</text>
      <circle cx="550" cy="92" r="16" fill="#cdb094"/><path d="M531 120 Q550 100 569 120 Z" fill="#2f7064"/></g>`;
  }
  // lower third
  if(ov.lowerThird){
    s+=`<g font-family="Segoe UI,Arial">
      <rect x="40" y="276" width="300" height="54" rx="8" fill="#0a1019" opacity=".9" stroke="#2a3644"/>
      <rect x="40" y="276" width="6" height="54" rx="3" fill="#f0a829"/>
      <text x="58" y="300" font-size="15" fill="#e8edf3" font-weight="800">EDUTECH AVIONIK</text>
      <text x="58" y="319" font-size="11" fill="#8b9bad" letter-spacing="1">Podcast Pendidikan · Episod 01</text></g>`;
  }
  // CTA
  if(ov.cta){
    s+=`<g font-family="Segoe UI,Arial">
      <rect x="420" y="250" width="150" height="40" rx="20" fill="#e8463c"/>
      <text x="495" y="275" text-anchor="middle" font-size="15" fill="#fff" font-weight="800">▶ LANGGAN</text>
      <rect x="420" y="300" width="150" height="30" rx="8" fill="#0a1019" stroke="#2a3644"/>
      <text x="495" y="320" text-anchor="middle" font-size="11" fill="#9fb0c2">Kongsi · Nota Tunjuk</text></g>`;
  }
  // viewfinder corners + REC + label
  s+=`<g stroke="#e8edf3" stroke-width="2" fill="none" opacity=".85">
      <path d="M14 28 V14 H28"/><path d="M626 28 V14 H612"/>
      <path d="M14 332 V346 H28"/><path d="M626 332 V346 H612"/></g>
    <circle cx="34" cy="30" r="5" fill="#e8463c"/>
    <text x="46" y="34" font-size="13" fill="#e8edf3" font-family="Consolas,monospace" font-weight="700">REC</text>
    <rect x="520" y="332" width="100" height="20" rx="4" fill="#000a" />
    <text x="615" y="346" text-anchor="end" font-size="12" fill="#f0a829" font-family="Consolas,monospace" letter-spacing="1">${label}</text>`;
  return s;
}
function frame(p){
  const z=p.zoom, cx=p.cx, cy=p.cy;
  const tx=320-cx*z, ty=180-cy*z;
  return `<svg viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg">
    <defs><linearGradient id="wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a2330"/><stop offset="1" stop-color="#0d141c"/></linearGradient>
      <clipPath id="fr"><rect x="0" y="0" width="640" height="360"/></clipPath></defs>
    <rect x="0" y="0" width="640" height="360" fill="#0a0e14"/>
    <g clip-path="url(#fr)"><g transform="translate(${tx},${ty}) scale(${z})">${STUDIO}</g>
      <rect x="0" y="0" width="640" height="360" fill="url(#vig)" opacity="0"/></g>
    ${overlays(p.ov,p.label)}</svg>`;
}

/* ---------- SCENE DATA ---------- */
const M='mod', P='pak';
const SCENES=[
{n:'01',key:'INTRO',title:'Intro',time:'0:00 – 3:00',
 shot:'Wide / Establishing (WS)',angle:'Aras mata (eye-level), sedikit tinggi untuk establishing',
 move:'Push-in perlahan (dolly-in) dari wide ke medium',
 comp:['Simetri — kedua-dua hos seimbang kiri & kanan','Panel logo di latar belakang','Headroom mencukupi; lower-third tajuk masuk','Jingle + motion graphic tajuk'],
 chips:['Simetri','Lower-third','Push-in','Jingle'],
 fp:{zoom:1,cx:320,cy:200,label:'WS · ESTABLISHING',ov:{thirds:true,lowerThird:true}},
 script:[
  [M,`Selamat datang ke EduTech Avionik — podcast yang membongkar bagaimana teknologi pendidikan sedang mengubah cara kita melatih generasi juruteknik dan jurutera avionik. Saya hos anda. Dalam episod kali ini, kita meneroka satu persoalan yang semakin mendesak: ketika kokpit pesawat menjadi semakin pintar, adakah cara kita mengajar avionik juga turut berubah dengan sepadan?`],
  [M,`Untuk menjawab persoalan itu, saya ditemani seorang tetamu yang membawa pengalaman bertahun-tahun dalam bidang ini — daripada bilik kuliah hingga ke hangar sebenar. Selamat datang ke podcast kita.`],
  [P,`Terima kasih kerana menjemput saya. Ini topik yang sangat dekat di hati saya, jadi saya teruja untuk berkongsi.`],
  [M,`Sepanjang 60 minit akan datang, kita akan menyelami trend terkini, kelebihan sebenar, cabaran yang jujur, contoh yang berjaya, dan nasihat praktikal yang boleh anda bawa pulang. Jadi — mari kita mulakan.`],
 ]},
{n:'02',key:'PAKAR',title:'Pengenalan Pakar',time:'3:00 – 12:00',
 shot:'Medium two-shot → Medium close-up (MCU) pakar',
 angle:'Aras mata',move:'Cut dari two-shot ke MCU pakar bila dia bercakap',
 comp:['Rule of thirds — pakar pada garis 1/3','Looking room di hadapan arah pandangan','Pakar pandang ke moderator (off-camera)','Latar lembut (shallow depth of field)'],
 chips:['Two-shot','MCU','Rule of thirds','Shallow DOF'],
 fp:{zoom:2.3,cx:425,cy:150,label:'MCU · PAKAR',ov:{thirds:true}},
 script:[
  [M,`Sebelum kita masuk ke isu teknologi, saya mahu pendengar mengenali siapa yang bercakap dengan kita hari ini. Boleh kongsikan latar belakang dan bagaimana perjalanan anda bermula dalam bidang avionik?`],
  [P,`Dengan senang hati. Saya bermula bukan sebagai pendidik, tetapi sebagai juruteknik di lapangan — tangan kotor dengan pendawaian dan unit avionik. Selepas beberapa tahun, saya dapati saya lebih banyak melatih juruteknik baharu berbanding membaiki pesawat. Daripada situ, minat saya beralih kepada bagaimana orang belajar bidang ini.`],
  [M,`Apa yang mula-mula menarik minat anda, dan adakah ia berbeza daripada apa yang anda bayangkan?`],
  [P,`Mula-mula saya tertarik dengan kerumitannya. Sebuah pesawat moden ialah sistem di dalam sistem. Tetapi apa yang saya tidak jangka ialah betapa pentingnya cara kita mengajar kerumitan itu — pengetahuan teknikal sahaja tidak memadai kalau penyampaiannya lemah.`],
  [M,`Sepanjang kerjaya anda, apa perubahan paling besar yang anda saksikan dalam cara avionik diajar?`],
  [P,`Peralihan daripada kertas kepada digital. Dulu kami belajar dengan manual tebal dan papan latihan fizikal yang mahal. Hari ini pelajar boleh berlatih prosedur yang sama berpuluh kali dalam simulator, tanpa risiko dan tanpa kos bahan. Itu anjakan yang besar.`],
 ]},
{n:'03',key:'TREND',title:'Perkembangan Terkini',time:'12:00 – 22:00',
 shot:'Medium two-shot + insert B-roll',
 angle:'Aras mata; B-roll pelbagai sudut',move:'Cutaway ke B-roll demo teknologi semasa pakar menerangkan',
 comp:['Talking head + insert teknologi','Bila B-roll: potong penuh ke frame demo','Istilah teknikal dipaparkan sebagai grafik','Penanda bab (chapter marker) di sini'],
 chips:['Cutaway','B-roll','Chapter marker','Grafik istilah'],
 fp:{zoom:1.5,cx:320,cy:165,label:'MS + B-ROLL',ov:{broll:true}},
 script:[
  [M,`Mari kita lihat lanskap semasa. Apakah teknologi pendidikan paling penting yang sedang mengubah pengajaran avionik hari ini?`],
  [P,`Saya namakan empat. Pertama, simulator dan part-task trainer berasaskan komputer. Kedua, realiti maya dan tambahan — VR untuk prosedur berisiko tinggi, AR untuk panduan kerja yang menindih maklumat terus ke atas peralatan. Ketiga, digital twin — replika digital sistem pesawat untuk menguji senario kerosakan dengan selamat. Dan keempat, tutor pintar berasaskan AI yang menyesuaikan latihan mengikut tahap pelajar.`],
  [M,`Antara teknologi ini, yang mana paling matang dan yang mana masih eksperimen?`],
  [P,`Simulator dan latihan berasaskan komputer sudah matang dan terbukti. AR sedang pesat matang untuk panduan penyelenggaraan. VR bergantung pada kualiti kandungan. Tutor AI yang paling baharu — menjanjikan, tetapi masih perlu diuji teliti sebelum kita bergantung sepenuhnya.`],
  [M,`Bagaimana perubahan dalam industri penerbangan sendiri mendorong perubahan cara kita mengajar?`],
  [P,`Pesawat moden semakin dikawal perisian dan data. Juruteknik hari ini bukan sekadar membaiki perkakasan, tetapi membaca data dan berfikir secara sistem. Jadi latihan terpaksa beralih daripada menghafal kepada pemikiran sistem.`],
 ]},
{n:'04',key:'KELEBIHAN',title:'Kelebihan Teknologi',time:'22:00 – 32:00',

 angle:'Aras mata',move:'Statik / pergerakan minimum',
 comp:['Subjek pada 1/3 kiri','Grafik statistik di ruang 1/3 kanan','Pastikan ruang kosong untuk grafik','Gunakan contoh sebenar & angka'],
 chips:['MCU','On-screen graphics','Rule of thirds'],
 fp:{zoom:2.1,cx:300,cy:150,label:'MCU + GRAFIK',ov:{graphics:true}},
 script:[
  [M,`Soalan yang lebih penting: apa kelebihan paling ketara berbanding kaedah tradisional?`],
  [P,`Empat. Keselamatan — pelajar boleh tersilap dalam simulator tanpa merosakkan peralatan bernilai jutaan. Pengulangan — ulang prosedur sebanyak yang perlu tanpa kos bahan. Maklum balas serta-merta — sistem tunjuk silap pada saat itu juga. Dan akses — pelajar di lokasi terpencil pun boleh mengakses latihan yang sama.`],
  [M,`Ada data atau angka tentang impak ini — peningkatan pemahaman atau pengurangan masa latihan?`],
  [P,`Saya berhati-hati di sini, kerana angka berbeza mengikut konteks. Tetapi arah penemuan cukup konsisten: latihan berasaskan simulasi cenderung mempercepatkan penguasaan dan meningkatkan pengekalan, manakala panduan AR mengurangkan kadar kesilapan dalam tugas kompleks. Lihat keberkesanannya secara relatif — lebih cepat, lebih konsisten, lebih sedikit silap — bukan terpaku pada satu peratusan ajaib.`],
  [M,`Kaedah penyampaian yang macam mana paling berkesan?`],
  [P,`Pendekatan berbaur (blended). Teori dalam talian, kemahiran dalam simulator, dan pengesahan pada peralatan sebenar. Teknologi tidak menggantikan tangan di atas perkakasan — ia membina kesediaan supaya masa dengan peralatan sebenar digunakan lebih cekap.`],
 ]},

 script:[
  [M,`Tiada cerita transformasi yang jujur tanpa bahagian yang susah. Apa halangan paling besar dalam melaksanakan teknologi pendidikan untuk avionik?`],
  [P,`Empat yang kerap saya temui. Kos permulaan yang tinggi. Infrastruktur dan penyelenggaraan. Kesediaan pengajar — alat canggih tidak bermakna jika pengajar tidak yakin menggunakannya. Dan penerimaan regulatori — kaedah latihan selalunya perlu diluluskan dalam rangka kerja seperti Part-147, jadi inovasi mesti seiring pematuhan.`],
  [M,`Pernahkah satu pelaksanaan tidak menjadi seperti dirancang? Apa yang anda pelajari?`],
  [P,`Ya. Sebuah organisasi membeli set VR mahal kerana teruja, tetapi tidak melatih pengajar dan tidak mengintegrasikannya ke kurikulum. Hasilnya, peralatan itu berhabuk di stor. Pengajarannya: teknologi tanpa pedagogi dan tanpa pengurusan perubahan akan gagal. Beli penyelesaian kepada masalah pengajaran, bukan teknologi kerana ia nampak hebat.`],
  [M,`Untuk institusi dengan bajet terhad, apa penyelesaian praktikal?`],
  [P,`Mula kecil dan bijak. Guna simulator sumber terbuka atau AR pada telefon pintar sebelum melabur besar. Kongsi fasiliti. Pilih satu atau dua topik paling sukar dan selesaikan itu dahulu — bukan mendigitalkan semuanya sekali gus.`],
 ]},
{n:'06',key:'CONTOH',title:'Contoh Berkesan',time:'42:00 – 52:00',

  [M,`Mari lihat apa yang berjaya. Boleh kongsikan satu contoh di mana teknologi pendidikan benar-benar berjaya dalam latihan avionik?`],
  [P,`Bayangkan modul mengesan kerosakan sistem — topik yang pelajar selalu bergelut. Situasinya: pelajar tidak cukup peluang berlatih kerana setiap senario memerlukan peralatan dan masa pengajar. Tindakannya: pasukan latihan memperkenalkan persekitaran maya di mana pelajar mencetuskan pelbagai senario kerosakan dan menyelesaikannya berulang kali, dengan panduan AR bila tersekat. Hasilnya: pelajar datang ke sesi peralatan sebenar lebih bersedia, lebih yakin, dan membuat lebih sedikit silap asas.`],
  [M,`Apa faktor yang membuatkan contoh ini berjaya, sedangkan yang lain gagal?`],
  [P,`Tiga. Ia diintegrasikan ke kurikulum, bukan tampalan sampingan. Pengajar dilatih dan menyokong — melihatnya sebagai pembantu, bukan ancaman. Dan ia dibina untuk menyelesaikan masalah pembelajaran yang jelas, bukan untuk kelihatan moden.`],
  [M,`Jika seorang pendidik mahu mencuba esok, apa langkah pertama?`],
  [P,`Kenal pasti satu topik yang pelajar paling kerap gagal. Satu sahaja. Rancang rintis kecil dengan alat paling mudah yang anda mampu. Ukur kesannya, perbaiki, dan barulah kembangkan. Langkah pertama bukan membeli teknologi — ia memahami masalah dengan jelas.`],
 ]},

/* ---------- RENDER ---------- */
const tabs=document.getElementById('tabs'), stage=document.getElementById('stage');
let cur=0;
SCENES.forEach((s,i)=>{
  const t=document.createElement('div');
  t.className='tab'; t.innerHTML=`<div class="tn">SCENE ${s.n}</div><div class="tt">${s.title}</div>`;
  t.onclick=()=>show(i); tabs.appendChild(t);

  const pan=document.createElement('section');
  pan.className='panel'; pan.id='p'+i;
  pan.innerHTML=`
    <div class="scenehead"><span class="num">SCENE ${s.n}</span><h2>${s.title}</h2><span class="tc">⏱ ${s.time}</span></div>
    <div class="grid">
      <div class="monitor">${frame(s.fp)}
        <div class="moncap"><span><span class="dot"></span>RAKAMAN · ${s.shot}</span><span>EduTech Avionik · EP01</span></div>
      </div>
      <div class="specs">
        <div class="specrow"><div class="k">Saiz Syot</div><div class="v">${s.shot}</div></div>
        <div class="specrow"><div class="k">Sudut Kamera</div><div class="v">${s.angle}</div></div>
        <div class="specrow"><div class="k">Pergerakan Kamera</div><div class="v">${s.move}</div></div>
        <div class="specrow"><div class="k">Komposisi</div><ul>${s.comp.map(c=>`<li>${c}</li>`).join('')}</ul>
          <div style="margin-top:8px">${s.chips.map(c=>`<span class="chip">${c}</span>`).join('')}</div></div>
      </div>
    </div>
    <div class="script"><h3>Skrip Dialog</h3>
      ${s.script.map(l=>`<div class="ln"><div class="who ${l[0]}">${l[0]==='mod'?'MODERATOR':'PAKAR'}</div><div class="tx">${l[1]}</div></div>`).join('')}
    </div>`;
  stage.appendChild(pan);
});
const foot=document.createElement('div');
foot.className='foot';
foot.innerHTML=`<div class="legend"><span><b class="mod">▮</b> MODERATOR — bertanya</span><span><b class="pak">▮</b> PAKAR — menjawab</span><span>Storyboard sketch · ilustrasi shot (bukan rakaman sebenar)</span></div>`;
stage.appendChild(foot);

function show(i){
  cur=(i+SCENES.length)%SCENES.length;
  [...tabs.children].forEach((t,k)=>t.classList.toggle('active',k===cur));
  [...stage.querySelectorAll('.panel')].forEach((p,k)=>p.classList.toggle('show',k===cur));
  tabs.children[cur].scrollIntoView({inline:'center',block:'nearest',behavior:'smooth'});
  window.scrollTo({top:0,behavior:'smooth'});
}
document.getElementById('prev').onclick=()=>show(cur-1);
document.getElementById('next').onclick=()=>show(cur+1);
document.getElementById('print').onclick=()=>window.print();
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')show(cur+1);if(e.key==='ArrowLeft')show(cur-1);});
show(0);
</script>
